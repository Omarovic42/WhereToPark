name: CI
on:
  push:
  pull_request:
    branches: [preprod, main]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: code/api/package-lock.json }
      - name: npm audit (bloquant sur high/critical)
        working-directory: code/api
        run: |
          npm ci --no-audit --no-fund
          npm audit --omit=dev --audit-level=high
      - name: Scan de secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

  api-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: code/api/package-lock.json }
      - name: Install
        working-directory: code/api
        run: npm ci --no-audit --no-fund
      - name: Tests unitaires + intégration (sans secret)
        working-directory: code/api
        run: npm test
      - name: Couverture
        working-directory: code/api
        run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        with: { name: coverage, path: code/api/coverage/lcov-report }

  performance:
    runs-on: ubuntu-latest
    needs: [api-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: code/api/package-lock.json }
      - name: Démarrer l'API (mode démo, sans secret)
        working-directory: code/api
        run: |
          npm ci --no-audit --no-fund
          nohup node src/server.js > perf-api.log 2>&1 &
          sleep 3
          curl -fsS http://localhost:5000/health
      - uses: grafana/setup-k6-action@v1
      - name: Test de charge k6 (seuils bloquants p95<200ms, erreurs<1%)
        run: k6 run code/api/tests/perf/health-load.js
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: perf-api-log, path: code/api/perf-api.log }

  docker-build:
    runs-on: ubuntu-latest
    needs: [security-checks, performance]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (reproductible, sans secret réel)
        run: docker build -f code/api/Dockerfile -t wheretopark-api:${{ github.sha }} code
      - name: Smoke test /health en mode démo
        run: |
          docker run -d --name smoke -p 5000:5000 wheretopark-api:${{ github.sha }}
          sleep 4
          curl -fsS http://localhost:5000/health | grep '"status":"ok"'

  ci-passed:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - run: echo "CI verte — fusion autorisée"
