# ═══════════════════════════════════════════════════════════════════
# Production — services externes auto-hébergés (zéro dépendance aux
# serveurs de démonstration publics).
#
# 1) Préparer les données routières (une seule fois) :
#      bash scripts/osrm-prepare.sh
#      (ou avec une autre région Geofabrik :
#       bash scripts/osrm-prepare.sh https://download.geofabrik.de/europe/france-latest.osm.pbf)
#
# 2) Démarrer l'ensemble :
#      docker compose -f docker-compose.yml -f docker-compose.selfhost.yml up -d
#
# Le front interroge GET /v1/config au démarrage : si OSRM_URL est défini,
# les itinéraires sont calculés par CE serveur ; sinon, repli sur le
# serveur de démonstration public (acceptable en démo uniquement).
# En production derrière un domaine, exposer OSRM via le reverse proxy
# (ex. https://osrm.wheretopark.app) et reporter l'URL dans OSRM_URL.
# ═══════════════════════════════════════════════════════════════════
services:
  osrm:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld --max-table-size 8000 /data/region.osrm
    volumes:
      - ./osrm-data:/data:ro
    ports: ["5001:5000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:5000/route/v1/driving/4.38,45.44;4.39,45.44' | grep -q Ok || exit 1"]
      interval: 30s
      retries: 3

  api:
    environment:
      OSRM_URL: ${OSRM_URL:-http://localhost:5001}
